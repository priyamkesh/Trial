<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; overflow: hidden;
            background: #000;
            height: 100vh;
            font-family: sans-serif;
        }

        #header {
            padding: 20px;
            position: absolute; top: 0; left: 0;
            z-index: 10; pointer-events: none;
        }
        #gradient-header-text {
            font-size: 1.5em; font-weight: bold;
            background: linear-gradient(to bottom, #00FFFF 0%, #00FF00 50%, #FFFF00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: block; width: max-content;
        }
        #header-copyright {
            background: linear-gradient(to right, #FF8C00, #FFD700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 0.8em; margin-top: 5px; width: max-content;
        }

        /* Color HUD */
        #color-hud {
            position: absolute; top: 18px; right: 18px;
            z-index: 10; pointer-events: none;
            display: flex; align-items: center; gap: 10px;
        }
        #color-swatch {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 12px var(--active-color, #00FFFF);
            background: var(--active-color, #00FFFF);
            transition: background 0.3s, box-shadow 0.3s;
        }
        #color-label {
            font-size: 0.75em; color: rgba(255,255,255,0.5);
            letter-spacing: 0.08em; text-transform: uppercase;
        }

        .canvas-container {
            position: relative; width: 100%; height: 100%;
        }

        video { display: none; }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
        }

        /* Layering: static draw < pointer overlay */
        #staticCanvas { z-index: 5; }
        #drawCanvas   { z-index: 6; background: transparent; }
        #pointerCanvas { z-index: 7; }

        #footer {
            padding: 15px; width: 100%;
            text-align: center;
            font-family: 'Caveat', cursive; font-size: 1.5em;
            position: absolute; bottom: 0; left: 0;
            z-index: 10; pointer-events: none;
            background: linear-gradient(to right, #8A2BE2, #00BFFF, #00FFFF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="header">
        <span id="gradient-header-text">PriAxom AIR©</span>
        <div id="header-copyright">Dynamic Vector Severing Engine</div>
    </div>

    <div id="color-hud">
        <span id="color-label">Cyan</span>
        <div id="color-swatch"></div>
    </div>

    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <!-- staticCanvas: committed strokes baked here, never redrawn unless mutated -->
        <canvas id="staticCanvas"></canvas>
        <!-- drawCanvas: active (in-progress) strokes only -->
        <canvas id="drawCanvas"></canvas>
        <!-- pointerCanvas: hand skeleton + cursor, cleared every frame -->
        <canvas id="pointerCanvas"></canvas>
    </div>

    <div id="footer">Draw (☝🏻) • Erase (✌🏻) • Select (🖐🏻) • Move (🤏🏻) • Say "Save" or Colors</div>

<script>
'use strict';

// ─── DOM & CONTEXTS ────────────────────────────────────────────────────────────
const videoElement   = document.getElementById('webcam');
const pointerCanvas  = document.getElementById('pointerCanvas');
const drawCanvas     = document.getElementById('drawCanvas');
const staticCanvas   = document.getElementById('staticCanvas');
const colorSwatch    = document.getElementById('color-swatch');
const colorLabel     = document.getElementById('color-label');

const pointerCtx = pointerCanvas.getContext('2d', { alpha: false, desynchronized: true });
const drawCtx    = drawCanvas.getContext('2d',    { alpha: true,  desynchronized: true });
const staticCtx  = staticCanvas.getContext('2d',  { alpha: true,  desynchronized: true });

// ─── CANVAS RESIZE ─────────────────────────────────────────────────────────────
function resizeCanvases() {
    const W = window.innerWidth, H = window.innerHeight;
    [pointerCanvas, drawCanvas, staticCanvas].forEach(c => {
        c.width  = W;
        c.height = H;
    });
    // Static layer must be redrawn after resize
    redrawStaticLayer();
}
window.addEventListener('resize', resizeCanvases, { passive: true });
resizeCanvases();

// ─── ACTIVE COLOR ──────────────────────────────────────────────────────────────
const COLORS = {
    cyan:   { color: '#00FFFF', glow: '#1E90FF', label: 'Cyan'   },
    red:    { color: '#FF0000', glow: '#DC143C', label: 'Red'    },
    green:  { color: '#00FF00', glow: '#32CD32', label: 'Green'  },
    white:  { color: '#FFFFFF', glow: '#AAAAAA', label: 'White'  },
    blue:   { color: '#00BFFF', glow: '#1E90FF', label: 'Blue'   },
    purple: { color: '#FF00FF', glow: '#8A2BE2', label: 'Purple' },
};
let activeColorKey = 'cyan';
let activeColor    = COLORS.cyan.color;
let activeGlow     = COLORS.cyan.glow;

function setColor(key) {
    if (!COLORS[key]) return;
    activeColorKey = key;
    activeColor    = COLORS[key].color;
    activeGlow     = COLORS[key].glow;
    colorSwatch.style.setProperty('--active-color', activeColor);
    colorSwatch.style.background   = activeColor;
    colorSwatch.style.boxShadow    = `0 0 12px ${activeColor}`;
    colorLabel.textContent = COLORS[key].label;
}
setColor('cyan');

// ─── STROKE CLASS ──────────────────────────────────────────────────────────────
class Stroke {
    constructor(color, glow) {
        this.points   = [];
        this.selected = false;
        this.color    = color;
        this.glow     = glow;
        this.bounds   = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
        this._path    = null;
        this._dirty   = true;
    }

    addPoint(x, y) {
        const pts = this.points;
        if (pts.length > 0) {
            const last = pts[pts.length - 1];
            // 2px deadzone — kills sub-pixel jitter without sacrificing fidelity
            if ((x - last.x) * (x - last.x) + (y - last.y) * (y - last.y) < 4) return;
        }
        pts.push({ x, y });
        const b = this.bounds;
        if (x < b.minX) b.minX = x;
        if (x > b.maxX) b.maxX = x;
        if (y < b.minY) b.minY = y;
        if (y > b.maxY) b.maxY = y;
        this._dirty = true;
    }

    // Optimised move: O(1) bounds update by offsetting, not scanning
    translate(dx, dy) {
        const pts = this.points;
        for (let i = 0, n = pts.length; i < n; i++) {
            pts[i].x += dx;
            pts[i].y += dy;
        }
        const b = this.bounds;
        b.minX += dx; b.maxX += dx;
        b.minY += dy; b.maxY += dy;
        this._dirty = true;
    }

    // Full recalculate — only needed after erasing splits a stroke
    recalcBounds() {
        const b = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
        for (let i = 0, pts = this.points, n = pts.length; i < n; i++) {
            const { x, y } = pts[i];
            if (x < b.minX) b.minX = x;
            if (x > b.maxX) b.maxX = x;
            if (y < b.minY) b.minY = y;
            if (y > b.maxY) b.maxY = y;
        }
        this.bounds = b;
        this._dirty = true;
    }

    getPath() {
        if (!this._dirty && this._path) return this._path;
        const p   = new Path2D();
        const pts = this.points;
        const n   = pts.length;
        if (n > 0) {
            p.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < n - 1; i++) {
                const xc = (pts[i].x + pts[i + 1].x) * 0.5;
                const yc = (pts[i].y + pts[i + 1].y) * 0.5;
                p.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
            }
            if (n > 1) p.lineTo(pts[n - 1].x, pts[n - 1].y);
        }
        this._path  = p;
        this._dirty = false;
        return p;
    }
}

// ─── STATE ─────────────────────────────────────────────────────────────────────
let strokes = [];          // all committed strokes
let activeStrokes = [];    // strokes currently being drawn (in progress) — rendered on drawCanvas

function mkHandState() {
    return {
        currentStroke:      null,
        grabbedIdx:         -1,
        lastPinchPos:       null,
        isSelecting:        false,
        selStart:           null,
        selCurrent:         null,
        smoothPt:           null,
        activeState:        'idle',
        lastDetectedState:  'idle',
        stateConfidence:    0,
    };
}
const handStates = [mkHandState(), mkHandState()];

// ─── STATIC LAYER ──────────────────────────────────────────────────────────────
// Committed strokes are painted onto staticCanvas once and never redrawn
// unless something mutates them (erase, move, select) — flagged by staticDirty.
let staticDirty = false;

function markStaticDirty() { staticDirty = true; }

function redrawStaticLayer() {
    staticCtx.clearRect(0, 0, staticCanvas.width, staticCanvas.height);
    staticCtx.lineCap  = 'round';
    staticCtx.lineJoin = 'round';
    for (let i = 0, n = strokes.length; i < n; i++) {
        const s = strokes[i];
        if (s.points.length < 2) continue;
        if (s.selected) {
            staticCtx.strokeStyle = '#FFFF00';
            staticCtx.shadowColor = '#FFD700';
            staticCtx.lineWidth   = 6;
            staticCtx.shadowBlur  = 20;
        } else {
            staticCtx.strokeStyle = s.color;
            staticCtx.shadowColor = s.glow;
            staticCtx.lineWidth   = 4;
            staticCtx.shadowBlur  = 12;
        }
        staticCtx.stroke(s.getPath());
    }
}

// Commit a finished in-progress stroke to the static layer
function commitStroke(stroke) {
    if (!stroke || stroke.points.length < 2) return;
    strokes.push(stroke);
    // Paint only the new stroke incrementally — avoids full redraw
    staticCtx.lineCap  = 'round';
    staticCtx.lineJoin = 'round';
    staticCtx.strokeStyle = stroke.color;
    staticCtx.shadowColor = stroke.glow;
    staticCtx.lineWidth   = 4;
    staticCtx.shadowBlur  = 12;
    staticCtx.stroke(stroke.getPath());
}

// ─── MEDIAPIPE DECOUPLING ──────────────────────────────────────────────────────
// Hand processing and render are on separate rAF ticks.
// latestResults acts as a single-slot lock-free buffer.
let latestResults = null;
function onResults(results) { latestResults = results; }

// ─── RENDER ENGINE ─────────────────────────────────────────────────────────────
function renderEngine() {
    requestAnimationFrame(renderEngine);

    // If static layer was mutated this frame, repaint it
    if (staticDirty) { redrawStaticLayer(); staticDirty = false; }

    // Consume the latest hand results (skip frame if none)
    if (!latestResults) {
        // Still need to clear pointer & draw canvases for smooth UX
        pointerCtx.fillStyle = '#000';
        pointerCtx.fillRect(0, 0, pointerCanvas.width, pointerCanvas.height);
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        return;
    }
    const results   = latestResults;
    latestResults   = null;

    const W = pointerCanvas.width, H = pointerCanvas.height;

    // ── Pointer canvas: black bg + hand skeleton ──────────────────────────────
    pointerCtx.fillStyle = '#000';
    pointerCtx.fillRect(0, 0, W, H);

    // ── Draw canvas: active (in-progress) strokes only ────────────────────────
    drawCtx.clearRect(0, 0, W, H);

    const multiLM = results.multiHandLandmarks;

    for (let i = 0; i < handStates.length; i++) {
        const st = handStates[i];

        if (!multiLM || i >= multiLM.length) {
            // Hand lost — finalise any open state
            if (st.currentStroke) { commitStroke(st.currentStroke); st.currentStroke = null; }
            st.grabbedIdx    = -1;
            st.lastPinchPos  = null;
            st.smoothPt      = null;
            st.activeState   = 'idle';
            st.stateConfidence = 0;
            if (st.isSelecting) finalizeSelection(st);
            continue;
        }

        const lm = multiLM[i];

        // Hand skeleton — always render to edge of frame
        drawConnectors(pointerCtx, lm, HAND_CONNECTIONS, { color: '#00FFFF', lineWidth: 2 });
        drawLandmarks(pointerCtx,  lm, { color: '#FFFFFF', lineWidth: 1, radius: 2 });

        // ── Landmark extraction ───────────────────────────────────────────────
        const thumbX  = lm[4].x  * W, thumbY  = lm[4].y  * H;
        const rawIX   = lm[8].x  * W, rawIY   = lm[8].y  * H;
        const midX    = lm[12].x * W, midY    = lm[12].y * H;
        const ringX   = lm[16].x * W, ringY   = lm[16].y * H;
        const pinkyX  = lm[20].x * W, pinkyY  = lm[20].y * H;

        // EMA smoothing on index fingertip
        if (!st.smoothPt) st.smoothPt = { x: rawIX, y: rawIY };
        const ALPHA    = 0.5;
        const indexX   = rawIX * ALPHA + st.smoothPt.x * (1 - ALPHA);
        const indexY   = rawIY * ALPHA + st.smoothPt.y * (1 - ALPHA);
        st.smoothPt.x  = indexX;
        st.smoothPt.y  = indexY;

        // ── Finger state flags ────────────────────────────────────────────────
        const idxUp   = lm[8].y  < lm[6].y;
        const midUp   = lm[12].y < lm[10].y;
        const ringUp  = lm[16].y < lm[14].y;
        const pinkUp  = lm[20].y < lm[18].y;

        const dTip2PB  = Math.hypot(lm[4].x - lm[17].x, lm[4].y - lm[17].y);
        const dIP2PB   = Math.hypot(lm[3].x - lm[17].x, lm[3].y - lm[17].y);
        const thumbFolded = dTip2PB < dIP2PB;

        const pdx = thumbX - rawIX, pdy = thumbY - rawIY;
        const pinchDist = Math.sqrt(pdx * pdx + pdy * pdy);

        // ── Gesture detection ─────────────────────────────────────────────────
        let detected = 'idle';
        if (pinchDist < 40)                                                 detected = 'pinching';
        else if (thumbFolded && idxUp && midUp && ringUp && pinkUp)         detected = 'selecting';
        else if (idxUp && midUp && !ringUp && !pinkUp)                      detected = 'erasing';
        else if (idxUp && !midUp && !ringUp && !pinkUp)                     detected = 'drawing';

        // Debounce: require 3 stable frames before committing state change
        if (detected === st.lastDetectedState) {
            if (++st.stateConfidence >= 3) st.activeState = detected;
        } else {
            st.stateConfidence = 0;
            st.lastDetectedState = detected;
        }

        const state = st.activeState;

        // ── DRAW ──────────────────────────────────────────────────────────────
        if (state === 'drawing') {
            pointerCtx.fillStyle = activeColor;
            pointerCtx.beginPath();
            pointerCtx.arc(indexX, indexY, 10, 0, Math.PI * 2);
            pointerCtx.fill();

            if (!st.currentStroke) {
                st.currentStroke = new Stroke(activeColor, activeGlow);
                st.currentStroke.addPoint(indexX, indexY);
            } else {
                const last = st.currentStroke.points[st.currentStroke.points.length - 1];
                const ddx  = indexX - last.x, ddy = indexY - last.y;
                const dist = Math.sqrt(ddx * ddx + ddy * ddy);

                if (dist > 50) {
                    // Dynamic Vector Severing — cut wild extrapolation spikes
                    commitStroke(st.currentStroke);
                    st.currentStroke = new Stroke(activeColor, activeGlow);
                    st.currentStroke.addPoint(indexX, indexY);
                } else {
                    st.currentStroke.addPoint(indexX, indexY);
                }
            }
        } else {
            if (st.currentStroke) {
                commitStroke(st.currentStroke);
                st.currentStroke = null;
            }
        }

        // ── SELECT ────────────────────────────────────────────────────────────
        if (state === 'selecting') {
            const ax = (indexX + midX + ringX + pinkyX) * 0.25;
            const ay = (indexY + midY + ringY + pinkyY) * 0.25;
            if (!st.isSelecting) { st.isSelecting = true; st.selStart = { x: ax, y: ay }; }
            st.selCurrent = { x: ax, y: ay };

            pointerCtx.strokeStyle = '#FFFF00';
            pointerCtx.lineWidth   = 2;
            pointerCtx.setLineDash([10, 10]);
            pointerCtx.strokeRect(
                st.selStart.x, st.selStart.y,
                st.selCurrent.x - st.selStart.x,
                st.selCurrent.y - st.selStart.y
            );
            pointerCtx.setLineDash([]);
        } else if (st.isSelecting) {
            finalizeSelection(st);
        }

        // ── ERASE ─────────────────────────────────────────────────────────────
        if (state === 'erasing') {
            const cx = (indexX + midX) * 0.5, cy = (indexY + midY) * 0.5, r = 35, r2 = r * r;

            pointerCtx.fillStyle = '#FF0044';
            pointerCtx.beginPath();
            pointerCtx.arc(cx, cy, r, 0, Math.PI * 2);
            pointerCtx.fill();

            let next = [];
            let erased = false;
            for (let k = 0; k < strokes.length; k++) {
                const s = strokes[k];
                const b = s.bounds;
                if (cx + r < b.minX || cx - r > b.maxX || cy + r < b.minY || cy - r > b.maxY) {
                    next.push(s); continue; // bounding-box fast reject
                }
                let seg = new Stroke(s.color, s.glow);
                const pts = s.points;
                for (let pi = 0, pn = pts.length; pi < pn; pi++) {
                    const pt = pts[pi];
                    const edx = pt.x - cx, edy = pt.y - cy;
                    if (edx * edx + edy * edy < r2) {
                        if (seg.points.length > 1) { next.push(seg); }
                        seg = new Stroke(s.color, s.glow);
                        erased = true;
                    } else {
                        seg.addPoint(pt.x, pt.y);
                    }
                }
                if (seg.points.length > 1) next.push(seg);
            }
            if (erased) { strokes = next; markStaticDirty(); }
        }

        // ── PINCH / MOVE ──────────────────────────────────────────────────────
        if (state === 'pinching') {
            const px = (thumbX + rawIX) * 0.5, py = (thumbY + rawIY) * 0.5;

            pointerCtx.strokeStyle = '#00FF00';
            pointerCtx.lineWidth   = 3;
            pointerCtx.beginPath();
            pointerCtx.moveTo(thumbX, thumbY);
            pointerCtx.lineTo(rawIX, rawIY);
            pointerCtx.stroke();
            pointerCtx.fillStyle = '#00FF00';
            pointerCtx.beginPath();
            pointerCtx.arc(px, py, 8, 0, Math.PI * 2);
            pointerCtx.fill();

            if (st.lastPinchPos) {
                const dx = px - st.lastPinchPos.x, dy = py - st.lastPinchPos.y;
                let moved = false;

                if (st.lastPinchPos) {
                const dx = px - st.lastPinchPos.x, dy = py - st.lastPinchPos.y;
                let moved = false;

                if (strokes.some(s => s.selected)) {
                    for (let k = 0; k < strokes.length; k++) {
                        if (strokes[k].selected) { strokes[k].translate(dx, dy); moved = true; }
                    }
                } else {
                    if (st.grabbedIdx === -1) {
                        // Find the nearest stroke to grab
                        let bestDist = Infinity, bestIdx = -1;
                        for (let k = 0; k < strokes.length; k++) {
                            const b = strokes[k].bounds;
                            if (px < b.minX - 60 || px > b.maxX + 60 ||
                                py < b.minY - 60 || py > b.maxY + 60) continue;
                            const pts = strokes[k].points;
                            for (let pi = 0, pn = pts.length; pi < pn; pi++) {
                                const d2 = (pts[pi].x - px) ** 2 + (pts[pi].y - py) ** 2;
                                if (d2 < 3600 && d2 < bestDist) { bestDist = d2; bestIdx = k; }
                            }
                        }
                        st.grabbedIdx = bestIdx;
                    }
                    if (st.grabbedIdx !== -1 && strokes[st.grabbedIdx]) {
                        strokes[st.grabbedIdx].translate(dx, dy);
                        moved = true;
                    }
                }
                if (moved) markStaticDirty();
            }
            st.lastPinchPos = { x: px, y: py };
        } else {
            st.grabbedIdx   = -1;
            st.lastPinchPos = null;
        }
// ── Render in-progress (active) stroke on drawCanvas ─────────────────
        if (st.currentStroke && st.currentStroke.points.length > 1) {
            drawCtx.lineCap    = 'round';
            drawCtx.lineJoin   = 'round';
            drawCtx.strokeStyle = st.currentStroke.color;
            drawCtx.shadowColor = st.currentStroke.glow;
            drawCtx.lineWidth   = 4;
            drawCtx.shadowBlur  = 12;
            drawCtx.stroke(st.currentStroke.getPath());
        }
    }

    pointerCtx.restore?.();
}
// ── Render in-progress (active) stroke on drawCanvas ─────────────────
        if (st.currentStroke && st.currentStroke.points.length > 1) {
            drawCtx.lineCap    = 'round';
            drawCtx.lineJoin   = 'round';
            drawCtx.strokeStyle = st.currentStroke.color;
            drawCtx.shadowColor = st.currentStroke.glow;
            drawCtx.lineWidth   = 4;
            drawCtx.shadowBlur  = 12;
            drawCtx.stroke(st.currentStroke.getPath());
        }
    }

    pointerCtx.restore?.();
}
// ─── SELECTION FINALISE ────────────────────────────────────────────────────────
function finalizeSelection(st) {
    st.isSelecting = false;
    if (!st.selStart || !st.selCurrent) return;
    const minX = Math.min(st.selStart.x, st.selCurrent.x);
    const maxX = Math.max(st.selStart.x, st.selCurrent.x);
    const minY = Math.min(st.selStart.y, st.selCurrent.y);
    const maxY = Math.max(st.selStart.y, st.selCurrent.y);

    let changed = false;
    for (let k = 0; k < strokes.length; k++) {
        const s  = strokes[k];
        const b  = s.bounds;
        const wasSelected = s.selected;
        // AABB-first cull, then point check
        if (b.maxX < minX || b.minX > maxX || b.maxY < minY || b.minY > maxY) {
            s.selected = false;
        } else {
            const pts = s.points;
            s.selected = false;
            for (let pi = 0, pn = pts.length; pi < pn; pi++) {
                if (pts[pi].x >= minX && pts[pi].x <= maxX &&
                    pts[pi].y >= minY && pts[pi].y <= maxY) {
                    s.selected = true; break;
                }
            }
        }
        if (s.selected !== wasSelected) changed = true;
    }
    if (changed) markStaticDirty();
}
// ─── KICK OFF RENDER LOOP ──────────────────────────────────────────────────────
renderEngine();

// ─── MEDIAPIPE HANDS ──────────────────────────────────────────────────────────
const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7,
});
hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720,
});
camera.start();

// ─── SPEECH RECOGNITION ───────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.continuous      = true;
    recognition.interimResults  = false;
    recognition.lang            = 'en-US';

    recognition.onresult = (event) => {
        const t = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();

        if (t.includes('clear')) {
            strokes = [];
            redrawStaticLayer();
        } else if (t.includes('save')) {
            const tmp  = document.createElement('canvas');
            tmp.width  = drawCanvas.width;
            tmp.height = drawCanvas.height;
            const tCtx = tmp.getContext('2d');
            tCtx.fillStyle = '#000';
            tCtx.fillRect(0, 0, tmp.width, tmp.height);
            tCtx.lineCap  = 'round';
            tCtx.lineJoin = 'round';
            for (const s of strokes) {
                if (s.points.length < 2) continue;
                tCtx.strokeStyle = s.selected ? '#FFFF00' : s.color;
                tCtx.shadowColor = s.selected ? '#FFD700' : s.glow;
                tCtx.lineWidth   = s.selected ? 6 : 4;
                tCtx.shadowBlur  = 12;
                tCtx.stroke(s.getPath());
            }
            const a      = document.createElement('a');
            a.href       = tmp.toDataURL('image/png');
            a.download   = 'PriAxom_AIR_Drawing.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } else if (t.includes('red'))    setColor('red');
        else if (t.includes('green'))    setColor('green');
        else if (t.includes('white'))    setColor('white');
        else if (t.includes('blue'))     setColor('blue');
        else if (t.includes('purple'))   setColor('purple');
        else if (t.includes('cyan'))     setColor('cyan');
    };

    recognition.onend = () => {
        // Robust restart — guard against browser calling onend in a tight loop
        setTimeout(() => {
            try { recognition.start(); } catch (_) {}
        }, 200);
    };

    recognition.onerror = (e) => {
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') return;
        setTimeout(() => { try { recognition.start(); } catch (_) {} }, 500);
    };

    recognition.start();
}
</script>
