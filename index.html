<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Skeleton & Age Estimator</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .video-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        video {
            display: block;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        #status {
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="status">Loading Neural Network Models...</div>
    
    <div class="video-container">
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        // We use the official github pages URL to load the pre-trained model weights
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';

        // 1. Load the models concurrently
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
        ]).then(startVideo).catch(err => {
            console.error(err);
            statusText.innerText = "Error loading models. Please check your network.";
        });

        // 2. Start the webcam
        function startVideo() {
            statusText.innerText = "Starting Camera...";
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } // Forces front camera on mobile devices
            })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "Camera Active - Analyzing Face...";
            })
            .catch(err => {
                console.error(err);
                statusText.innerText = "Camera access denied or unavailable.";
            });
        }

        // 3. Process the video feed
        video.addEventListener('play', () => {
            // Create and scale the canvas over the video
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            // Run detection loop every 100ms
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withAgeAndGender();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Clear the previous frame's drawings
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw the facial landmarks (the "skeleton")
                faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                
                // Draw the bounding box and estimated age
                resizedDetections.forEach(detection => {
                    const box = detection.detection.box;
                    const text = new faceapi.draw.DrawTextField(
                        [`${Math.round(detection.age)} years old`], 
                        box.bottomLeft
                    );
                    text.draw(canvas);
                });
            }, 100);
        });
    </script>
</body>
</html>
